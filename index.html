<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Coin</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            padding: 50px; 
            background: #1a1a2e; 
            color: white; 
        }
        .box { 
            background: #16213e; 
            padding: 30px; 
            border-radius: 10px; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎁 NHẬN COIN</h2>
        <p id="status">Đang kiểm tra...</p>
        <p id="message"></p>
    </div>

    <script>
        // Lấy code từ URL (VD: ?code=12345_67890)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        // 👇 THAY BẰNG URL API CỦA BẠN (có được sau khi chạy ngrok)
        const botApiUrl = 'https://6aa3510c8119f2.lhr.life'; 
        async function claimCoin() {
            if (!code) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Thiếu mã claim!</span>';
                return;
            }

            try {
                const response = await fetch(`${botApiUrl}/claim?code=${code}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('status').innerHTML = '<span class="success">✅ THÀNH CÔNG!</span>';
                    document.getElementById('message').innerHTML = `
                        <p>💰 Nhận được: ${data.coin} Coin</p>
                        <p>💳 Tổng số dư: ${data.balance} Coin</p>
                        <p>Quay lại Discord để mua hàng nhé!</p>
                    `;
                } else {
                    document.getElementById('status').innerHTML = `<span class="error">❌ ${data.message}</span>`;
                }
            } catch (e) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Lỗi kết nối!</span>';
            }
        }

        claimCoin();
    </script>
</body>
</html>
